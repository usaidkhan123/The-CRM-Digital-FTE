apiVersion: v1
kind: Secret
metadata:
  name: agent-secret
  namespace: taskflow-prod
type: Opaque
stringData:
  GEMINI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: taskflow-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: agent-service
          image: taskflow/agent-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: MEMORY_SERVICE_URL
              value: http://memory-service:8002
          envFrom:
            - secretRef:
                name: agent-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: taskflow-prod
spec:
  selector:
    app: agent-service
  ports:
    - port: 8001
      targetPort: 8001
